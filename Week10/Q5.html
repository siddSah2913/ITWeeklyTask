<!-- WAP in javascript using for loop to display 4 images with image name as 1.jpg, 2.jpg, 3.jpg and 4.jpg.  -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5</title>
</head>

<body>
    <h1>Javascript For Loop</h1>
</body>
<script>
    // using for loop to display 4 images with image name as 1.jpg, 2.jpg, 3.jpg and 4.jpg.
    for (var i = 1; i <= 4; i++) {
        document.write("<img src ='Q5images/" + i + ".jpg' width ='300px' alt ='Image " + i + "'><br>");
        document.write(i + ".jpg<br><br>");
    }
</script>
</body>

</html>
