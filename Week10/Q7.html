<!-- WAP in javascript using loop to display following table layout and with alternate background color on data rows  -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 7</title>

    <style>
        table {
            border-collapse: collapse;
            width: 70%;
        }

        th,
        td {
            border: 2px solid #ffffff;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #5C8FA4;
            color: #ffffff;
        }

        .odd {
            background-color: #D2DCE0;
        }

        .even {
            background-color: #E9EEF1;
        }
    </style>
</head>


<body>
    <h1>Table using loop</h1>
    <script>
        document.write("<table>");
        document.write("<tr>");
        document.write("<th>S.N.</th><th>Name</th><th>Image</th>");
        document.write("</tr>");

        for (var i = 1; i <= 4; i++) {
            if (i % 2 == 0) {
                document.write("<tr class='even'>");
            } else {
                document.write("<tr class='odd'>");
            }
            document.write("<td>" + i + "</td>");
            document.write("<td>Name " + i + "</td>");
            document.write("<td>" + i + ".jpg</td>");
            document.write("</tr>");

        }
        document.write("</table>");

    </script>
</body>

</html>
