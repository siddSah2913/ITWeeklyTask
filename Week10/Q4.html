<!-- WAP to get number input with prompt dialog dox and show the Day using switch case 
a. For Case 1, show Sunday 
b. For Case 2, show Monday 
c. For Case 3, show Tuesday 
d. For Case 4, show Wednesday 
e. For Case 5, show Thursday 
f. For Case 6, show Friday 
g. For Case 7, show Saturday 
h. For default, show Invalid  -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4</title>
</head>

<body>
    <h1 align="center">Javascript Switch Case</h1>
</body>
<script>
    // getting the number from the user
    var dayNumber = parseInt(prompt("Enter the day number(1-7):"));

    // checking the number and displaying the result
    switch (dayNumber) {
        case 1:
            alert("Day is Sunday");
            break;
        case 2:
            alert("Day is Monday");
            break;
        case 3:
            alert("Day is Tuesday");
            break;
        case 4:
            alert("Day is Wednesday");
            break;
        case 5:
            alert("Day is Thursday");
            break;
        case 6:
            alert("Day is Friday");
            break;
        case 7:
            alert("Day is Saturday");
            break;
        default:
            alert("Invalid input entered! Please enter a number between 1 and 7");
    }
</script>
</html>
