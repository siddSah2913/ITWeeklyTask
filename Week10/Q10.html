<!-- Write a Javascript function to calculate area of rectangle which accepts two parameters – length and breadth -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10</title>
</head>

<body>
    <h1>Area of Rectangle</h1>
    <script>
        // function to calculate area of rectangle
        function areaRec(length, breadth) {
            return length * breadth;
        }

        // taking length and breadth from user
        var length = parseFloat(prompt("Enter the length of the rectangle : "));
        var breadth = parseFloat(prompt("Enter the breadth of the rectangle : "));

        document.write("Area of the rectangle = " + areaRec(length, breadth));

    </script>
</body>

</html>
