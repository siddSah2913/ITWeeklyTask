<!-- WAP to show the use if …. Else if …. else for following conditions: 
a. For marks > = 80 and marks <=100, show Distinction 
b. For marks >=60 and marks < 80, show First Division 
c. For marks >=50 and marks < 60, show Second Division 
d. For marks >=40 and marks <50, show Third Division 
e. For marks < 40, show Fail  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3</title>
</head>
<body>
    <h1 align="center">Javascript If ... Else If ... Else</h1>
    <script>
        // getting the marks from the user
        var marks = prompt("Enter your marks");

        // checking the marks and displaying the result
        if (marks >= 80 && marks <= 100) {
            alert("Congratulations! You have scored Distinction");
        } else if (marks >= 60 && marks < 80) {
            alert("Congratulations! You have scored First Division");
        } else if (marks >= 50 && marks < 60) {
            alert("Congratulations! You have scored Second Division");
        } else if (marks >= 40 && marks < 50) {
            alert("Congratulations! You have scored Third Division");
        } else if (marks < 40) {
            alert("Sorry! You have failed");
        }
        else {
            alert("Invalid marks entered! Please enter a number between 0 and 100");
        }
    </script>
</body>
</html>
