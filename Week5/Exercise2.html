<!--Looking at the screen given below write the HTML code making use of following tags
Unordered Lists
Ordered Lists
Definition Lists
Heading tag
Text Content
Heading 1: Example on Unordered List
• Sportstar
• Business Week
• Time
Heading 2: Example on Ordered List
iv. Sportstar
v. Business Week
vi. Time
Heading 3: Example on Definition List
Sports Magazine
Sportstar
Business Magazine
Business Week-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-2 [List]</title>
</head>
<body>
    <h1>Heading 1: Example on Unordered List</h1>
    <ul>
        <li>Sportstar</li>
        <li>Business Week</li>
        <li>Time</li>
    </ul>

    <h2>Heading 2: Example on Ordered List</h2>
    <ol type ="i" start ="4">
        <li>Sportstar</li>
        <li>Business Week</li>
        <li>Time</li>
    </ol>

    <h3>Heading 3: Example on Definition List</h3>
    <dl>
        <dt>Sports Magazine</dt>
        <dd>Sportstar</dd>

        <dt>Business Magazine</dt>
        <dd>Business Week</dd>
    </dl>

</body>
</html>
