<!-- WAP to display multiplication number of 5 as follows: 
5 * 1 = 5 
5 * 2 = 10 
5 * 3 = 15 
…………… 
……………. 
5 * 10 = 50 -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6 </title>
</head>

<body>
    <h1>Javascript For Loop</h1>
    <script>
        // iterating for loop to display multiplication table of 5
        for (let i = 1; i <= 10; i++) {
            document.write("5 * " + i + " = " + (5 * i) + "<br>");
        }
    </script>
</body>

</html>
