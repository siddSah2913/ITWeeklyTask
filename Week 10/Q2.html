<!-- Write a program to input two data values for Your Name and Student Id in prompt 
dialog boxes and show them in alert dialog box. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
</head>
<body>
    <h1 align="center">Javascript Prompt and Alert</h1>
</body>
<script>
    // giving the user a prompt to enter their name and student id
    var yourName = prompt("Enter your name");
    var studentId = prompt("Enter your student id");

    // checking if the name and student id are not null and displaying the result in an alert dialog box
    if (yourName !== null && studentId !== null) {
        alert("Name: " + yourName + "\nStudent Id: " + studentId);
    }
    else {
        alert("Name or Student Id not entered");
    }
    
</script>
</html>
