<!-- Write a program in Javascript to create variables to store numeric, float, string and
Boolean values and show them in page with document.write() function.
 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
</head>

<body>
    <h1>Javascript Variables Examples</h1>

    <script>
        // creating variables to store numeric, float, string and boolean values
        var numericValue = 29;
        var floatValue = 8.5;
        var stringValue = "Ram";
        var booleanValue = true;

        // displaying the values
        document.write("Numeric Value: " + numericValue + "<br>");
        document.write("Float Value: " + floatValue + "<br>");
        document.write("String Value: " + stringValue + "<br>");
        document.write("Boolean Value: " + booleanValue + "<br>");

    </script>
</body>

</html>
