<!-- Write a JavaScript program to compute the sum and product of an array of integers -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9</title>
</head>

<body>
    <h1>Sum and Product of an Array of Integers</h1>
    <script>
        // taking array elements from user
        var input = prompt("Enter integers separated by commas : ");
        var arr = input.split(",");

        // declaring variables : sum and product
        var sum = 0;
        var product = 1;

        // using loop to add and multiply each element of the array
        for (var i = 0; i < arr.length; i++) {
            num = parseInt(arr[i]);
            sum += num;
            product *= num;
        }

        // showing the result
        document.write("Array = [ " + arr + " ]<br>");
        document.write("Sum of array elements = " + sum + "<br>");
        document.write("Product of array elements = " + product);
    </script>
</body>

</html>
