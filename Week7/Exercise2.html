<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
</head>

<body>

    <div style="width: 400px; border: 2px solid black; padding: 20px;">
        <h2>HTML Form Test</h2>

        <form>
            <table cellpadding="10">
                <tr>
                    <td>Name</td>
                    <td><input type="text" name="name" style="width:200px;"></td>
                </tr>

                <tr>
                    <td>Address</td>
                    <td><input type="text" name="address" style="width:200px;"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="email" name="email" style="width:200px;"></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender"> Female
                    </td>
                </tr>

                <tr>
                    <td>Hobbies</td>
                    <td>
                        <input type="checkbox"> Sports
                        <input type="checkbox"> Movies
                        <input type="checkbox"> Travelling
                    </td>
                </tr>

                <tr>
                    <td>Country</td>
                    <td>
                        <select style="width:210px;">
                            <option>Nepal</option>
                            <option>India</option>
                            <option>China</option>
                            <option>USA</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Message</td>
                    <td>
                        <textarea rows="8" cols="40"></textarea>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
    </div>

</body>

</html>
