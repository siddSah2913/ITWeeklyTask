<!DOCTYPE html>
<html>

<head>
    <title>Exercise 1</title>
</head>

<body>
    <h1 align="center">Exercise 1</h1>
    <!-- image1 -->
    <img src="image1.jpg" alt="Image 1" style="border: 5px solid black;">
    <p>This is image1 with a 5px border.</p>
    <hr>

    <!-- image2 -->
    <a href="image2.jpg">
        <img src="image2.jpg" alt="Image 2" width="100" height="100">
    </a>
    <p>This is image2 resized to 100x100. Click to open original.</p>
    <hr>

    <!-- image3 -->
    <img src="image3.jpg" alt="Image 3" align="right">
    <p>This is image3 aligned to the right. The text appears on the left side of the image.</p>
    <br clear="right">
    <hr>

    <!-- image4 -->
    <img src="image4.jpg" alt="Image 4" hspace="50" vspace="50">
    <p>This is image4 with 50px horizontal and vertical spacing.</p>

</body>

</html>
